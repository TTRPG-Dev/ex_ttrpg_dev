name: Release

on:
  workflow_dispatch:
    inputs:
      cli_bump:
        description: 'Version bump for ttrpg_dev_cli'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      lib_bump:
        description: 'Version bump for ex_ttrpg_dev (none = skip Hex.pm release)'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  version-bump:
    name: Bump versions, commit, and tag
    runs-on: ubuntu-latest
    outputs:
      cli_version: ${{ steps.bump.outputs.cli_version }}
      lib_version: ${{ steps.bump.outputs.lib_version }}
      lib_changed: ${{ steps.bump.outputs.lib_changed }}
      sha: ${{ steps.commit.outputs.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute and apply version bumps
        id: bump
        run: |
          bump_version() {
            local version="$1" bump="$2"
            IFS='.' read -r major minor patch <<< "$version"
            case "$bump" in
              major) echo "$((major + 1)).0.0" ;;
              minor) echo "$major.$((minor + 1)).0" ;;
              patch) echo "$major.$minor.$((patch + 1))" ;;
            esac
          }

          # ---- CLI ----
          CLI_CURRENT=$(grep -m1 'version:' apps/ttrpg_dev_cli/mix.exs | sed 's/.*version: "//;s/".*//')
          CLI_NEW=$(bump_version "$CLI_CURRENT" "${{ inputs.cli_bump }}")
          sed -i "0,/version: \"${CLI_CURRENT}\"/s/version: \"${CLI_CURRENT}\"/version: \"${CLI_NEW}\"/" apps/ttrpg_dev_cli/mix.exs

          # ---- Root umbrella (tracks CLI version) ----
          ROOT_CURRENT=$(grep -m1 'version:' mix.exs | sed 's/.*version: "//;s/".*//')
          sed -i "0,/version: \"${ROOT_CURRENT}\"/s/version: \"${ROOT_CURRENT}\"/version: \"${CLI_NEW}\"/" mix.exs

          # ---- Rust CLI (tracks CLI version) ----
          CARGO_CURRENT=$(grep -m1 '^version' cli/Cargo.toml | sed 's/version = "//;s/".*//')
          sed -i "0,/^version = \"${CARGO_CURRENT}\"/s/^version = \"${CARGO_CURRENT}\"/version = \"${CLI_NEW}\"/" cli/Cargo.toml

          # ---- Library ----
          LIB_CURRENT=$(grep -m1 'version:' apps/ex_ttrpg_dev/mix.exs | sed 's/.*version: "//;s/".*//')
          LIB_NEW="$LIB_CURRENT"
          LIB_CHANGED="false"

          if [ "${{ inputs.lib_bump }}" != "none" ]; then
            LIB_NEW=$(bump_version "$LIB_CURRENT" "${{ inputs.lib_bump }}")
            sed -i "0,/version: \"${LIB_CURRENT}\"/s/version: \"${LIB_CURRENT}\"/version: \"${LIB_NEW}\"/" apps/ex_ttrpg_dev/mix.exs
            LIB_CHANGED="true"
          fi

          echo "cli_version=$CLI_NEW" >> "$GITHUB_OUTPUT"
          echo "lib_version=$LIB_NEW" >> "$GITHUB_OUTPUT"
          echo "lib_changed=$LIB_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bumps
        id: commit
        run: |
          git add mix.exs apps/ttrpg_dev_cli/mix.exs cli/Cargo.toml

          if [ "${{ steps.bump.outputs.lib_changed }}" == "true" ]; then
            git add apps/ex_ttrpg_dev/mix.exs
            MSG="chore: release ttrpg_dev_cli v${{ steps.bump.outputs.cli_version }}, ex_ttrpg_dev v${{ steps.bump.outputs.lib_version }}"
          else
            MSG="chore: release ttrpg_dev_cli v${{ steps.bump.outputs.cli_version }}"
          fi

          git commit -m "$MSG"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create and push release tags
        run: |
          git tag "v${{ steps.bump.outputs.cli_version }}"

          if [ "${{ steps.bump.outputs.lib_changed }}" == "true" ]; then
            git tag "lib/v${{ steps.bump.outputs.lib_version }}"
          fi

          git push --tags

  publish-hex:
    name: Publish ex_ttrpg_dev to Hex.pm
    needs: version-bump
    if: needs.version-bump.outputs.lib_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.sha }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.5'
          otp-version: '28.3.1'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: apps/ex_ttrpg_dev/deps
          key: ${{ runner.os }}-mix-hex-${{ hashFiles('apps/ex_ttrpg_dev/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-hex-

      - name: Install dependencies
        working-directory: apps/ex_ttrpg_dev
        run: mix deps.get

      - name: Publish to Hex.pm
        working-directory: apps/ex_ttrpg_dev
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

  build-rust:
    name: Build Rust CLI (${{ matrix.artifact }})
    needs: version-bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            artifact: linux
            binary: ttrpg-dev
            musl: true
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            artifact: macos_arm
            binary: ttrpg-dev
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            artifact: macos
            binary: ttrpg-dev
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact: windows
            binary: ttrpg-dev.exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.sha }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install musl tools
        if: ${{ matrix.musl }}
        run: sudo apt-get install -y musl-tools

      - name: Add Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ matrix.os }}-cargo-${{ matrix.rust_target }}-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-cargo-${{ matrix.rust_target }}-

      - name: Build
        working-directory: cli
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ttrpg-dev-${{ matrix.artifact }}
          path: cli/target/${{ matrix.rust_target }}/release/${{ matrix.binary }}

  build-engine:
    name: Build Elixir engine (all targets)
    needs: version-bump
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.sha }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.5'
          otp-version: '28.3.1'

      - name: Install asdf
        run: |
          go install github.com/asdf-vm/asdf/cmd/asdf@v0.18.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
          echo "${ASDF_DATA_DIR:-$HOME/.asdf}/shims" >> $GITHUB_PATH

      - name: Install Zig via asdf
        run: |
          asdf plugin add zig https://github.com/asdf-community/asdf-zig.git
          asdf install zig

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-prod-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-prod-

      - name: Install dependencies
        run: mix deps.get --only prod

      - name: Build Burrito engine (all targets)
        run: MIX_ENV=prod mix release ttrpg_dev_engine --overwrite

      - name: Upload engine artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ttrpg-dev-engine-all
          path: burrito_out/

  github-release:
    name: Package and publish GitHub release
    needs: [version-bump, build-rust, build-engine]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.sha }}

      - name: Download Rust binaries
        uses: actions/download-artifact@v4
        with:
          pattern: ttrpg-dev-*
          path: rust_bins/
          merge-multiple: false

      - name: Download engine binaries
        uses: actions/download-artifact@v4
        with:
          name: ttrpg-dev-engine-all
          path: engine_bins/

      - name: Package release archives
        run: |
          mkdir -p release_packages

          package_unix() {
            local target="$1"
            cp "rust_bins/ttrpg-dev-${target}/ttrpg-dev" ./ttrpg-dev
            cp "engine_bins/ttrpg_dev_engine_${target}" ./ttrpg-dev-engine
            chmod +x ttrpg-dev ttrpg-dev-engine
            tar -czf "release_packages/ttrpg-dev_${target}.tar.gz" ttrpg-dev ttrpg-dev-engine
            rm ttrpg-dev ttrpg-dev-engine
          }

          package_unix linux
          package_unix macos
          package_unix macos_arm

          cp rust_bins/ttrpg-dev-windows/ttrpg-dev.exe ./ttrpg-dev.exe
          cp engine_bins/ttrpg_dev_engine_windows.exe ./ttrpg-dev-engine.exe
          zip release_packages/ttrpg-dev_windows.zip ttrpg-dev.exe ttrpg-dev-engine.exe
          rm ttrpg-dev.exe ttrpg-dev-engine.exe

      - name: Create source archive
        run: |
          git archive \
            --format=tar.gz \
            --prefix=ex_ttrpg_dev-${{ needs.version-bump.outputs.lib_version }}/ \
            HEAD \
            > ex_ttrpg_dev-${{ needs.version-bump.outputs.lib_version }}-source.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.cli_version }}
          generate_release_notes: true
          files: |
            release_packages/*
            ex_ttrpg_dev-*-source.tar.gz
