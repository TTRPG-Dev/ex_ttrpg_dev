# Other Tools

[equipment.disguise_kit]
name = "Disguise Kit"
category = "tool"
tool_type = "kit"
cost = "25 gp"
weight = 3
description = "This pouch of cosmetics, hair dye, and small props lets you create disguises that change your physical appearance."

[equipment.forgery_kit]
name = "Forgery Kit"
category = "tool"
tool_type = "kit"
cost = "15 gp"
weight = 5
description = "A forgery kit includes several different types of ink, a variety of parchments and papers, several quills, seals and sealing wax, gold and silver leaf, and other supplies necessary to create convincing forgeries of physical documents."

[equipment.herbalism_kit]
name = "Herbalism Kit"
category = "tool"
tool_type = "kit"
cost = "5 gp"
weight = 3
description = "This kit contains a variety of instruments such as clippers, mortar and pestle, and pouches and vials used by herbalists to create remedies and potions."

[equipment.navigators_tools]
name = "Navigator's Tools"
category = "tool"
tool_type = "kit"
cost = "25 gp"
weight = 2
description = "This set of instruments is used for navigation at sea. Proficiency with navigator's tools lets you chart a ship's course and follow navigation charts."

[equipment.poisoners_kit]
name = "Poisoner's Kit"
category = "tool"
tool_type = "kit"
cost = "50 gp"
weight = 2
description = "A poisoner's kit includes the vials, chemicals, and other equipment necessary for the creation of poisons."

[equipment.thieves_tools]
name = "Thieves' Tools"
category = "tool"
tool_type = "kit"
cost = "25 gp"
weight = 1
description = "This set of tools includes a small file, a set of lock picks, a small mirror mounted on a metal handle, a set of narrow-bladed scissors, and a pair of pliers."
