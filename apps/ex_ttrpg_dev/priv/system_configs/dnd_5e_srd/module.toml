[module]
name = "Dungeons and Dragons 5th Edition SRD"
slug = "dnd_5e_srd"
version = "1.0.0"
family = "dungeons_and_dragons"
series = "dungeons_and_dragons_5e"
publisher = "Wizards of the Coast, Inc."
level_node = "character_trait('character_level').level"
custom_metadata_keys = [
  # ability / skill display
  "abbreviation", "description",
  # award
  "value_type",
  # background / race
  "skill_proficiencies", "damage_resistances", "languages",
  # character_trait
  "unit",
  # class / race
  "armor_proficiencies", "hit_die", "tool_proficiencies",
  # currency
  "in_copper",
  # equipment — physical properties
  "category", "cost", "weight", "description",
  "armor_type", "ac_base", "ac_bonus", "ac_dex_bonus", "ac_dex_max",
  "stealth_disadvantage", "strength_requirement",
  "weapon_type", "damages", "properties", "versatile_damage",
  "range_normal", "range_long", "tool_type",
  # language
  "script",
  # spell display / rules
  "school", "casting_time", "duration", "range",
  "concentration", "ritual", "verbal", "somatic", "material"
]

[[concept_type]]
id = "ability"
name = "Ability"

[[concept_type]]
id = "skill"
name = "Skill"

[[concept_type]]
id = "rolling_method"
name = "Rolling Method"

[[concept_type]]
id = "language"
name = "Language"
display.template = "{{name}} ({{script}})"

[[concept_type]]
id = "roll"
name = "Roll"

[[concept_type]]
id = "equipment"
name = "Equipment"

[[concept_type]]
id = "currency"
name = "Currency"

[[concept_type]]
id = "saving_throw"
name = "Saving Throw"

[[concept_type]]
id = "character_trait"
name = "Character Trait"

[[concept_type]]
id = "race"
name = "Race"

[[concept_type]]
id = "background"
name = "Background"

[[concept_type]]
id = "class"
name = "Class"

[[concept_type]]
id = "character_progression"
name = "Character Progression"

[[concept_type]]
id = "award"
name = "Award"

[[concept_type]]
id = "damage_type"
name = "Damage Type"

[[concept_type]]
id = "spell"
name = "Spell"
display.template = "{{name}}: Level {{level}}, {{school}} ({{?verbal:V}}{{?somatic:S}}{{?material:M}})"

[[concept_type]]
id = "feat"
name = "Feat"

[[character_list]]
label = "Skill Proficiencies"
metadata_key = "skill_proficiencies"
concept_type = "skill"

[[character_list]]
label = "Languages"
metadata_key = "languages"
concept_type = "language"
choice_concept_type = "language"

[[character_list]]
label = "Weapon Proficiencies"
metadata_key = "weapon_proficiencies"

[[character_list]]
label = "Armor Proficiencies"
metadata_key = "armor_proficiencies"

[[character_list]]
label = "Tool Proficiencies"
metadata_key = "tool_proficiencies"
choice_concept_type = "equipment"

[[character_list]]
label = "Damage Resistances"
metadata_key = "damage_resistances"
concept_type = "damage_type"

[[metadata_contributions]]
from_type = "class"
from_field = "weapon_proficiencies"
to_type = "equipment"
to_field = "is_proficient"
value = 1
label_filters = [
  {label = "Simple Weapons", filter_field = "weapon_category", filter_value = "simple"},
  {label = "Martial Weapons", filter_field = "weapon_category", filter_value = "martial"}
]

[display]
signed_fields = ["modifier", "bonus"]
