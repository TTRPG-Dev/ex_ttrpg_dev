[equipment.lamp]
name = "Lamp"
category = "adventuring_gear"
cost = "5 sp"
weight = 1
description = "A lamp casts bright light in a 15-foot radius and dim light for an additional 30 feet. Once lit, it burns for 6 hours on a flask (1 pint) of oil."

[equipment.bullseye_lantern]
name = "Lantern, Bullseye"
category = "adventuring_gear"
cost = "10 gp"
weight = 2
description = "A bullseye lantern casts bright light in a 60-foot cone and dim light for an additional 60 feet. Once lit, it burns for 6 hours on a flask (1 pint) of oil."

[equipment.hooded_lantern]
name = "Lantern, Hooded"
category = "adventuring_gear"
cost = "5 gp"
weight = 2
description = "A hooded lantern casts bright light in a 30-foot radius and dim light for an additional 30 feet. Once lit, it burns for 6 hours on a flask (1 pint) of oil. As an action, you can lower the hood, reducing the light to dim light in a 5-foot radius."

[equipment.lock]
name = "Lock"
category = "adventuring_gear"
cost = "10 gp"
weight = 1
description = "A key is provided with the lock. Without the key, a creature proficient with thieves' tools can pick this lock with a successful DC 15 Dexterity check."

[equipment.magnifying_glass]
name = "Magnifying Glass"
category = "adventuring_gear"
cost = "100 gp"
description = "This lens allows a closer look at small objects. It is also useful as a substitute for flint and steel when starting fires. Lighting a fire with a magnifying glass requires light as bright as sunlight to focus, tinder to ignite, and about 5 minutes for the fire to ignite."

[equipment.manacles]
name = "Manacles"
category = "adventuring_gear"
cost = "2 gp"
weight = 6
description = "These metal restraints can bind a Small or Medium creature. Escaping the manacles requires a successful DC 20 Dexterity check. Breaking them requires a successful DC 20 Strength check. Each set of manacles comes with one key."

[equipment.mess_kit]
name = "Mess Kit"
category = "adventuring_gear"
cost = "2 sp"
weight = 1
description = "This tin box contains a cup and simple cutlery. The box clamps together, and one side can be used as a cooking pan and the other as a plate or shallow bowl."

[equipment.steel_mirror]
name = "Mirror, Steel"
category = "adventuring_gear"
cost = "5 gp"
weight = 0.5

[equipment.oil]
name = "Oil (flask)"
category = "adventuring_gear"
cost = "1 sp"
weight = 1
description = "Oil usually comes in a clay flask that holds 1 pint. As an action, you can splash the oil in this flask onto a creature within 5 feet of you or throw it up to 20 feet, shattering it on impact. On a hit, the target is covered in oil. If the target takes any fire damage before the oil dries (after 1 minute), the target takes an additional 5 fire damage from the burning oil."

