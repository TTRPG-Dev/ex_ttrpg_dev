[class.fighter]
name = "Fighter"
hit_die = "d10"
armor_proficiencies = ["Light Armor", "Medium Armor", "Heavy Armor", "Shield"]
weapon_proficiencies = ["Simple Weapons", "Martial Weapons"]

# Starting equipment choices (per D&D 5e SRD)
[class.fighter.choices.starting_armor]
required = true
type = "equipment"
grants_to = "inventory"
options = ["chain_mail", "leather_armor"]

[class.fighter.choices.starting_weapon]
required = true
type = "equipment"
grants_to = "inventory"
options = [
  "longsword",
  "battleaxe",
  "flail",
  "handaxe",
  "mace",
  "shortsword",
  "warhammer",
]

[class.fighter.choices.subclass]
required = true
type = "class"
options = ["champion"]

[class.fighter.choices.skill_proficiency_1]
required = true
type = "skill"
contributes_field = "modifier"
contributes_value = "character_trait('proficiency_bonus').bonus"
options = [
  "acrobatics",
  "animal_handling",
  "athletics",
  "history",
  "insight",
  "intimidation",
  "perception",
  "survival",
]

[class.fighter.choices.skill_proficiency_2]
required = true
type = "skill"
contributes_field = "modifier"
contributes_value = "character_trait('proficiency_bonus').bonus"
options = [
  "acrobatics",
  "animal_handling",
  "athletics",
  "history",
  "insight",
  "intimidation",
  "perception",
  "survival",
]

[[class.fighter.contributes]]
target = "saving_throw('strength').modifier"
value = "character_trait('proficiency_bonus').bonus"

[[class.fighter.contributes]]
target = "saving_throw('constitution').modifier"
value = "character_trait('proficiency_bonus').bonus"

[[class.fighter.contributes]]
target = "character_trait('max_hit_points').points"
value = "ability('constitution').modifier + 10"

[[class.fighter.contributes]]
target = "character_trait('max_hit_points').points"
value = "ability('constitution').modifier * (character_trait('character_level').level - 1)"

[class.champion]
name = "Champion"
