[class.warlock]
name = "Warlock"
hit_die = "d8"
armor_proficiencies = ["Light Armor"]
weapon_proficiencies = ["Simple Weapons"]

[class.warlock.choices.subclass]
required = true
type = "class"
options = ["the_fiend"]

[class.warlock.choices.skill_proficiency_1]
required = true
type = "skill"
contributes_field = "modifier"
contributes_value = "character_trait('proficiency_bonus').bonus"
options = [
  "arcana",
  "deception",
  "history",
  "intimidation",
  "investigation",
  "nature",
  "religion",
]

[class.warlock.choices.skill_proficiency_2]
required = true
type = "skill"
contributes_field = "modifier"
contributes_value = "character_trait('proficiency_bonus').bonus"
options = [
  "arcana",
  "deception",
  "history",
  "intimidation",
  "investigation",
  "nature",
  "religion",
]

[[class.warlock.contributes]]
target = "saving_throw('wisdom').modifier"
value = "character_trait('proficiency_bonus').bonus"

[[class.warlock.contributes]]
target = "saving_throw('charisma').modifier"
value = "character_trait('proficiency_bonus').bonus"

[[class.warlock.contributes]]
target = "character_trait('max_hit_points').points"
value = "ability('constitution').modifier + 8"

[[class.warlock.contributes]]
target = "character_trait('max_hit_points').points"
value = "ability('constitution').modifier * (character_trait('character_level').level - 1)"

[[class.warlock.contributes]]
target = "character_trait('spellcasting_ability_modifier').value"
value = "ability('charisma').modifier"

[[class.warlock.contributes]]
target = "character_trait('pact_magic').slot_count"
value = "class('warlock').pact_slot_count"

[[class.warlock.contributes]]
target = "character_trait('pact_magic').slot_level"
value = "class('warlock').pact_slot_level"

[class.warlock.pact_slot_count]
type = "mapping"
input = "character_trait('character_level').level"
steps = [[1, 1], [2, 2], [11, 3], [17, 4]]

[class.warlock.pact_slot_level]
type = "mapping"
input = "character_trait('character_level').level"
steps = [[1, 1], [3, 2], [5, 3], [7, 4], [9, 5]]

[class.the_fiend]
name = "The Fiend"
