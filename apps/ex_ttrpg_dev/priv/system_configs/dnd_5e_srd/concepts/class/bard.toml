[class.bard]
name = "Bard"
hit_die = "d8"
armor_proficiencies = ["Light Armor"]
weapon_proficiencies = ["Simple Weapons", "Hand Crossbow", "Longsword", "Rapier", "Shortsword"]

[class.bard.choices.subclass]
required = true
type = "class"
options = ["college_of_lore"]

[class.bard.choices.musical_instrument_1]
required = true
type = "equipment"
options = ["bagpipes", "drum", "dulcimer", "flute", "lute", "lyre", "horn", "pan_flute", "shawm", "viol"]

[class.bard.choices.musical_instrument_2]
required = true
type = "equipment"
options = ["bagpipes", "drum", "dulcimer", "flute", "lute", "lyre", "horn", "pan_flute", "shawm", "viol"]

