[class.bard]
name = "Bard"
hit_die = "d8"
armor_proficiencies = ["light_armor"]
weapon_proficiencies = ["simple_weapons", "hand_crossbow", "longsword", "rapier", "shortsword"]

[class.bard.choices.subclass]
required = true
type = "class"
options = ["college_of_lore"]

[class.bard.choices.musical_instrument_1]
required = true
type = "equipment"
options = ["bagpipes", "drum", "dulcimer", "flute", "lute", "lyre", "horn", "pan_flute", "shawm", "viol"]

