[class.barbarian]
name = "Barbarian"
hit_die = "d12"
armor_proficiencies = ["light_armor", "medium_armor", "shields"]
weapon_proficiencies = ["simple_weapons", "martial_weapons"]

[class.barbarian.choices.subclass]
required = true
type = "class"
options = ["berserker"]

[class.barbarian.choices.skill_proficiency_1]
required = true
type = "skill"
contributes_field = "modifier"
contributes_value = "character_trait('proficiency_bonus').bonus"
options = [
  "animal_handling",
  "athletics",
  "intimidation",
  "nature",
  "perception",
  "survival",
]

[class.barbarian.choices.skill_proficiency_2]
required = true
type = "skill"
contributes_field = "modifier"
contributes_value = "character_trait('proficiency_bonus').bonus"
options = [
  "animal_handling",
  "athletics",
  "intimidation",
  "nature",
  "perception",
  "survival",
]

[[class.barbarian.contributes]]
target = "saving_throw('strength').modifier"
value = "character_trait('proficiency_bonus').bonus"

[[class.barbarian.contributes]]
target = "saving_throw('constitution').modifier"
value = "character_trait('proficiency_bonus').bonus"

[[class.barbarian.contributes]]
target = "character_trait('max_hit_points').points"
value = "ability('constitution').modifier + 12"

[class.berserker]
name = "Berserker"
