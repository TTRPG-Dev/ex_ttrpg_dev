[class.druid]
name = "Druid"
hit_die = "d8"
armor_proficiencies = ["Light Armor", "Medium Armor", "Shield"]
weapon_proficiencies = ["Club", "Dagger", "Dart", "Javelin", "Mace", "Quarterstaff", "Scimitar", "Sickle", "Sling", "Spear"]
tool_proficiencies = ["Herbalism Kit"]

[class.druid.choices.subclass]
required = true
type = "class"
options = ["circle_of_the_land"]

[class.druid.choices.skill_proficiency_1]
required = true
type = "skill"
contributes_field = "modifier"
contributes_value = "character_trait('proficiency_bonus').bonus"
options = [
  "arcana",
  "animal_handling",
  "insight",
  "medicine",
  "nature",
  "perception",
  "religion",
  "survival",
]

[class.druid.choices.skill_proficiency_2]
required = true
type = "skill"
contributes_field = "modifier"
contributes_value = "character_trait('proficiency_bonus').bonus"
options = [
  "arcana",
  "animal_handling",
  "insight",
  "medicine",
  "nature",
  "perception",
  "religion",
  "survival",
]

[[class.druid.contributes]]
target = "saving_throw('intelligence').modifier"
value = "character_trait('proficiency_bonus').bonus"

[[class.druid.contributes]]
target = "saving_throw('wisdom').modifier"
value = "character_trait('proficiency_bonus').bonus"

[[class.druid.contributes]]
target = "character_trait('max_hit_points').points"
value = "ability('constitution').modifier + 8"

[[class.druid.contributes]]
target = "character_trait('max_hit_points').points"
value = "ability('constitution').modifier * (character_trait('character_level').level - 1)"

[[class.druid.contributes]]
target = "character_trait('spellcasting_ability_modifier').value"
value = "ability('wisdom').modifier"

[class.circle_of_the_land]
name = "Circle of the Land"
